{% extends "tracker/base.html" %}
{% block title %}Войти — Money Check{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12 bg-gray-50">
  <div class="w-full max-w-sm">

    <div class="mb-8 text-center">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-primary shadow-md mb-4">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M7 14.5C7 10.358 10.358 7 14.5 7C18.642 7 22 10.358 22 14.5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M14.5 7V4.5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M9 21h11" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
          <path d="M11.5 21v-3.5a3 3 0 016 0V21" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="14.5" cy="14.5" r="1.5" fill="white"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold tracking-tight">
        <span class="text-gray-900">Money</span><span class="text-primary">Check</span>
      </h1>
      <p class="text-gray-400 text-sm mt-1">Учёт расходов</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8 text-center">

      <!-- Error messages -->
      <div id="tg-error" class="hidden rounded-xl bg-red-50 text-red-700 px-4 py-3 text-sm mb-6"></div>

      <!-- Initial state: button -->
      <div id="tg-initial">
        <p class="text-gray-500 text-sm mb-6">Войдите через Telegram, чтобы продолжить</p>
        <button id="tg-btn"
          class="inline-flex items-center gap-2.5 px-6 py-3 rounded-xl font-semibold text-sm text-white
                 shadow-sm transition-colors"
          style="background:#2aabee"
          onclick="startTelegramAuth()">
          <!-- Telegram icon -->
          <svg width="20" height="20" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12l-6.871 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.833.941z"/>
          </svg>
          Войти через Telegram
        </button>
      </div>

      <!-- Waiting state -->
      <div id="tg-waiting" class="hidden">
        <div class="flex justify-center mb-4">
          <svg class="animate-spin text-primary" width="28" height="28" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
          </svg>
        </div>
        <p class="text-gray-700 text-sm font-medium mb-1">Ожидаем подтверждение</p>
        <p class="text-gray-400 text-xs">Откройте бота в Telegram и нажмите <strong>Запустить</strong></p>
        <button onclick="cancelAuth()" class="mt-5 text-xs text-gray-400 hover:text-gray-600 underline">Отмена</button>
      </div>

    </div>

  </div>
</div>

<script>
let pollTimer = null;
let currentToken = null;
const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

async function startTelegramAuth() {
  const btn = document.getElementById('tg-btn');
  btn.disabled = true;
  btn.style.opacity = '0.6';

  try {
    const res = await fetch('/auth/telegram/init/');
    const data = await res.json();
    currentToken = data.token;
    sessionStorage.setItem('tg_token', data.token);

    if (isMobile) {
      // На мобильном редиректим текущую страницу — window.open блокируется браузером
      window.location.href = data.deep_link;
    } else {
      window.open(data.deep_link, '_blank');
    }

    document.getElementById('tg-initial').classList.add('hidden');
    document.getElementById('tg-waiting').classList.remove('hidden');
    pollTimer = setInterval(pollAuth, 2000);
  } catch (e) {
    showError('Не удалось запустить авторизацию. Попробуйте снова.');
    btn.disabled = false;
    btn.style.opacity = '1';
  }
}

async function pollAuth() {
  if (!currentToken) return;
  try {
    const res = await fetch('/auth/telegram/poll/?token=' + currentToken);
    const data = await res.json();

    if (data.status === 'ok') {
      clearInterval(pollTimer);
      sessionStorage.removeItem('tg_token');
      window.location.href = '/';
    } else if (data.status === 'expired') {
      cancelAuth();
      showError('Ссылка устарела. Попробуйте снова.');
    } else if (data.status === 'error') {
      cancelAuth();
      showError('Ошибка авторизации. Попробуйте снова.');
    }
  } catch (e) { /* продолжаем опрос при сетевых ошибках */ }
}

function cancelAuth() {
  clearInterval(pollTimer);
  currentToken = null;
  sessionStorage.removeItem('tg_token');
  document.getElementById('tg-waiting').classList.add('hidden');
  document.getElementById('tg-initial').classList.remove('hidden');
  const btn = document.getElementById('tg-btn');
  btn.disabled = false;
  btn.style.opacity = '1';
}

function showError(msg) {
  const el = document.getElementById('tg-error');
  el.textContent = msg;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 5000);
}

// При возврате из Telegram на мобильном — подхватываем токен из sessionStorage
window.addEventListener('load', function () {
  const saved = sessionStorage.getItem('tg_token');
  if (saved) {
    currentToken = saved;
    document.getElementById('tg-initial').classList.add('hidden');
    document.getElementById('tg-waiting').classList.remove('hidden');
    pollTimer = setInterval(pollAuth, 2000);
  }
});
</script>
{% endblock %}
