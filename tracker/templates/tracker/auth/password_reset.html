{% extends "tracker/base.html" %}
{% block title %}Сброс пароля — Money Check{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12 bg-gray-50">
  <div class="w-full max-w-sm">

    <div class="mb-8 text-center">
      <div class="text-4xl mb-3">🔑</div>
      <h1 class="text-2xl font-bold text-gray-900">Сброс пароля</h1>
      <p class="text-gray-500 text-sm mt-1">Введите email — пришлём ссылку</p>
    </div>

    <form method="post" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 space-y-4">
      {% csrf_token %}

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
        <input type="email" name="email"
               autocomplete="email" inputmode="email"
               autofocus
               class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50
                      text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary
                      transition-colors"
               placeholder="you@example.com">
      </div>

      <button type="submit"
              class="press-scale w-full py-3 rounded-xl bg-primary text-white font-semibold text-sm
                     shadow-sm hover:bg-blue-700 transition-colors">
        Отправить ссылку
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      <a href="{% url 'login' %}" class="text-primary font-medium">← Назад</a>
    </p>

  </div>
</div>
{% endblock %}
