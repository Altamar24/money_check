upstream django {
    server web:8000;
}

# HTTP — redirect to HTTPS + certbot webroot
server {
    listen 80;
    server_name moneycheckk.ru www.moneycheckk.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://moneycheckk.ru$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name moneycheckk.ru www.moneycheckk.ru;
    client_max_body_size 20M;

    ssl_certificate     /etc/letsencrypt/live/moneycheckk.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/moneycheckk.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    location /static/ {
        alias /static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
    }
}
